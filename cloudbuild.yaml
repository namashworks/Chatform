# Cloud Build pipeline: build the container, push to Artifact Registry,
# deploy to Cloud Run. Trigger from GitHub or run manually with:
#
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_REPO=chatform,_SERVICE=chatform,_BUCKET=YOUR_BUCKET
#
# Required substitutions you set per-project:
#   _REGION   GCP region for Artifact Registry + Cloud Run (e.g. us-central1)
#   _REPO     Artifact Registry repository name (Docker format)
#   _SERVICE  Cloud Run service name
#   _BUCKET   GCS bucket name for session artifacts (must already exist)
#
# No deployer-side secrets required — each form creator pastes their own
# Gemini API key into the generator UI, and it's stored per-tenant in
# Firestore. You (the deployer) pay only for Cloud Run + Firestore + GCS;
# Gemini bills go to whoever's key was used to generate that chatbot.

substitutions:
  _REGION: us-central1
  _REPO: chatform
  _SERVICE: chatform
  _BUCKET: ""

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # 1. Build the container.
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$BUILD_ID
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - .

  # 2. Push both tags.
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}

  # 3. Deploy to Cloud Run. Session affinity keeps a chat session pinned to
  # one instance so Streamlit's in-memory session_state stays consistent.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --session-affinity
      - --timeout=900
      # NOTE: --update-env-vars *merges* — existing vars like PUBLIC_BASE_URL
      # (set once after the first deploy with the assigned Cloud Run hostname)
      # are preserved across redeploys. Using --set-env-vars instead would wipe
      # them every time.
      - --update-env-vars=STORAGE_BACKEND=cloud,GCP_PROJECT=$PROJECT_ID,GCS_BUCKET=${_BUCKET}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
